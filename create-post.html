<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post - Admin</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/create-post.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="create-page">

  <!-- Navigation Setup -->
  <nav class="create-nav">
    <div class="header-actions">
      <button class="back-btn" onclick="history.length > 1 ? history.back() : window.location.href='feed.html'">
        <svg fill="none" stroke="currentColor" width="24" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      </button>
      <span class="nav-title">New Recipe Post</span>
    </div>
    
    <div class="mode-toggle">
      <button id="editToggleBtn" class="toggle-btn active" onclick="toggleMode('edit')">Edit</button>
      <button id="previewToggleBtn" class="toggle-btn" onclick="toggleMode('preview')">Preview</button>
    </div>
    
    <button class="submit-btn" style="width: auto; padding: 0 24px; min-height: 38px;" onclick="handleInitiatePublish()">
      Publish
    </button>
  </nav>

  <!-- Editor Form Layout -->
  <main id="editorContainer" class="editor-container">
    
    <!-- Drag & Drop Interactive Upload -->
    <div class="upload-zone" id="uploadZone">
      <div id="uploadTextContainer" style="text-align: center;">
        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
        <p class="upload-text">Drag photo here or tap to select</p>
        <p class="upload-hint">JPEG, PNG, WEBP up to 5MB</p>
      </div>

      <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" style="display: none;">

      <div class="image-preview-container" id="imagePreviewContainer">
        <img id="previewImg" class="image-preview" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Preview" loading="lazy">
        <button type="button" class="change-photo-btn" onclick="triggerFileSelect(event)">
          <svg width="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> Change Photo
        </button>
      </div>
    </div>

    <!-- Main Content Input Form -->
    <div class="editor-card">
      <input type="text" id="postTitleInput" class="title-input" placeholder="Give your recipe a title..." aria-label="Recipe Title" required>
      
      <!-- Tags / Categories Input -->
      <div class="tags-input-wrapper" id="tagsWrapper" style="margin-top: 15px;">
        <!-- Tag chips injected by JS -->
        <input type="text" id="tagsInput" class="tag-input" placeholder="Add ingredients, tags, separated by comma..." aria-label="Recipe Tags">
      </div>

      <textarea id="postContentInput" class="content-input" placeholder="Write the story behind the dish, ingredients, and steps here..." aria-label="Recipe Content" required></textarea>
      
      <div class="editor-meta">
        <div class="meta-stats">
          <span class="meta-chip" id="charCountLabel">0 characters</span>
          <span class="meta-chip" id="wordCountLabel">0 words</span>
        </div>
        <span id="readTimeLabel" style="font-weight: 500;">0 min read</span>
      </div>
    </div>
  </main>

  <!-- Realtime Preview Skeleton Block -->
  <main id="previewContainer" class="preview-container">
    <div class="preview-hero">
      <img id="prevHeroImage" src="" alt="Hero Background">
    </div>
    <div class="preview-card">
      <h1 class="preview-title" id="prevTitle">Title Template</h1>
      <div class="preview-tags" id="prevTags"></div>
      <div class="preview-meta">
        <span id="prevDate">Date</span> | Just Now
      </div>
      <div class="preview-body" id="prevBody">
        Content Template.
      </div>
    </div>
  </main>

  <!-- Full Screen Blocking Publish State (Prevents corruption) -->
  <div id="publishOverlay" class="publish-overlay">
    <div class="publishing-spinner"></div>
    <div class="publishing-text">Publishing to Silvassa...</div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/create-post.js"></script>
</body>
</html>
