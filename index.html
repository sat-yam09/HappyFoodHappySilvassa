<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HappyFood</title>
  
  <!-- SEO & PWA Meta Tags -->
  <meta name="description" content="Your local and global cuisines exclusively for food lovers in Silvassa.">
  <meta property="og:title" content="Happy Food Happy Silvassa">
  <meta property="og:description" content="Your local and global cuisines exclusively for food lovers.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1495195134817-a165bd39e4e3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">
  <meta name="theme-color" content="#ED4593">
  <link rel="manifest" href="/manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/login.css">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="login-page">

  <!-- ANIMATED BLOB BACKGROUND -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- FROSTED GLASS CARD -->
  <div class="card">
    <div class="app-name">HappyFoodHappySilvassa</div>

    <!-- TAB SWITCHER -->
    <div class="tabs">
      <div class="tab-indicator" id="tabIndicator"></div>
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="form-section active" onsubmit="event.preventDefault(); handleLogin();">
      <div class="input-group">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
          </path>
        </svg>
        <input type="email" id="loginEmail" placeholder="Email address" aria-label="Email Address" required>
      </div>
      <div class="input-group">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
          </path>
        </svg>
        <input type="password" id="loginPassword" placeholder="Password" aria-label="Password" required>
        <button type="button" class="password-toggle" aria-label="Toggle password visibility" onclick="togglePassword('loginPassword')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
            </path>
          </svg>
        </button>
      </div>
      <button type="submit" class="submit-btn" id="loginBtn">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" class="form-section" onsubmit="event.preventDefault(); handleSignup();">
      <div class="input-group">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
        <input type="text" id="signupName" placeholder="Full Name" aria-label="Full Name" required>
      </div>
      <div class="input-group">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
          </path>
        </svg>
        <input type="email" id="signupEmail" placeholder="Email address" aria-label="Email Address" required>
      </div>
      <div class="input-group">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
          </path>
        </svg>
        <input type="password" id="signupPassword" placeholder="Create Password" aria-label="Create Password" required>
        <button type="button" class="password-toggle" aria-label="Toggle password visibility" onclick="togglePassword('signupPassword')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
            </path>
          </svg>
        </button>
      </div>
      <button type="submit" class="submit-btn" id="signupBtn">
        <span class="btn-text">Create Account</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="divider">
      <span>or continue with</span>
    </div>
    <button type="button" class="google-btn" onclick="handleGoogleLogin()">
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" class="google-icon">
      Continue with Google
    </button>

  </div>

  <!-- Toast Container (required on every page) -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts (order matters: config → utils → page logic) -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>

</body>

</html>
